syntax = "proto3";
package eic.v1;

service EditorService {
  rpc Edit (EditRequest) returns (EditResponse);
  rpc OpenSettings (OpenSettingsRequest) returns (OpenSettingsResponse);
  rpc Quit (QuitRequest) returns (QuitResponse);
  rpc Ping (PingRequest) returns (PingResponse);
}

message EditRequest {
  string file_path = 1;
  string title = 2;
  string initial_content = 3;
  bool no_save = 4;
  bool detach = 5;
  bool stdout_piped = 6;
  bool sudo = 7;

  // Identity of the client — used to display remote-session context in
  // the editor window. Empty client_hostname means local session.
  string client_hostname = 8;
  string client_user = 9;
  bool client_is_remote = 10;
}

message EditResponse {
  enum Outcome {
    OUTCOME_UNSPECIFIED = 0;
    SAVED = 1;
    DISCARDED = 2;
    DETACHED = 3;
    ERROR = 4;
  }
  Outcome outcome = 1;
  string content = 2;
  string error_message = 3;
}

message OpenSettingsRequest {}
message OpenSettingsResponse {}
message QuitRequest {}
message QuitResponse {}
message PingRequest {}
message PingResponse {
  string version = 1;
}
